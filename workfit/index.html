				<section data-markdown>
					<textarea data-template>
				### [Regulatory Focus Theory](https://en.wikipedia.org/wiki/Regulatory_focus_theory)

				Regulatory Focus Theory (RFT) is a psychological framework that explains how people's motivations and perceptions influence their goal-pursuit strategies.

				Understanding an employee's dominant focus can help managers frame goals and feedback more effectively to drive performance.

						</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				### [Promotion Focus](https://en.wikipedia.org/wiki/Regulatory_focus_theory)

				- Driven by growth, advancement, and accomplishment.
				- Focused on "ideals", hopes, and aspirations.
				- Uses eagerness-based strategies, where success is viewed as a "gain" and failure as a "non-gain".

				</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				### [Prevention Focus](https://en.wikipedia.org/wiki/Regulatory_focus_theory)

				- Driven by safety, security, and responsibility.
				- Focused on "oughts", obligations, and duties.
				- Uses vigilance-based strategies, where success is a "non-loss" and failure is a "loss".
					</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				### [Eagerness-based strategies](https://iaap-journals.onlinelibrary.wiley.com/doi/pdf/10.1111/apps.12376)

				proactive, promotion-focused approaches designed to achieve gains,
				fulfill aspirations, and accelerate goal attainment.
				These strategies focus on "making it happen" by utilizing enthusiasm
				and high engagement rather than caution and defense.

				While eagerness is a powerful motivator,
				it should be balanced with patience to avoid reckless, impulsive actions.
					</textarea>
				</section>


				<section data-markdown>
					<textarea data-template>
				### [Vigilance-based strategies](https://en.wikipedia.org/wiki/Vigilance_(psychology))

				Focus on maintaining a heightened state of awareness and systematic observation to identify
				threats, opportunities, or irregularities before they escalate.

				Vigilance-based strategies are critical in fields where human error
				or environmental changes pose significant risks
				to safety, performance, or competitive standing.
					</textarea>
				</section>


				<section data-markdown>
					<textarea data-template>
				### [Optimal task success](https://en.wikipedia.org/wiki/Regulatory_focus_theory)

				<img alt="is this team or group" src="images/regulatory-focus-flow.jpg" width="80%">

				Different goals (promotion: to win vs. prevention: not to lose)
				direct self-regulation and influence what motivation strategy works best.

						</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				### [Regulatory Fit Theory](https://en.wikipedia.org/wiki/Regulatory_focus_theory)

				When people use strategies that fit their motivation:

				- eager approach for promotion
				- vigilant avoidance for prevention

				they feel more motivated, enjoy the task more, and often perform better
						</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				### [Approach (eager) Motivation](https://ssrlsig.org/wp-content/uploads/2017/11/routledgehandbooks-9780203888148-chapter1-andy.pdf)

				Behavior is energized by positive stimuli.

				It focuses on reaching desired outcomes, such as exercising to "feel strong and energized".

				This is often linked to higher levels of intrinsic motivation, happiness, and a proactive attitude.

						</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				### [Avoidance (vigilant) Motivation](https://ssrlsig.org/wp-content/uploads/2017/11/routledgehandbooks-9780203888148-chapter1-andy.pdf)

				Behavior is directed away from negative stimuli.

				It focuses on steering clear of undesired results, like exercising to "avoid gaining weight".

				While functional, it is frequently associated with increased stress, anxiety, and a higher risk of burnout.
						</textarea>
				</section>


				<section data-markdown>
					<textarea data-template>
				#### [Focus / Motivation fit](https://www.frontiersin.org/journals/psychology/articles/10.3389/fpsyg.2022.807875/full)

				<img alt="is this team or group" src="images/regulatory-fit.png" width="60%">

				Results are best when style correlates with tasks goals.
				Example: Preventers prove correctness / control risks, Promoters generate options / experiment.

					</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				#### [communication styles](https://pmc.ncbi.nlm.nih.gov/articles/PMC2607037/)

				promotion-focused prefer to take chances and to be overly inclusive
				when evaluating their options so as not to overlook anything that could allow advancement.

				prevention-focused prefer to play it safe and to be overly exclusive
				when evaluating their options so as not to commit to something
				that compromises their security.

					</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				#### [Leadership styles](https://www.sciencedirect.com/topics/social-sciences/regulatory-focus-theory)

				<img alt="is this team or group" src="images/leader_focus.png" width="50%">

				leadership behavior is goal-pursuit behavior, and a certain style of leadership behavior is,
				in essence, a self-regulation strategy applied in this context.
									</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				#### [Transformative leadership](https://www.verywellmind.com/what-is-transformational-leadership-2795313)

				Main qualities of a transformational leader are authenticity, self-awareness, humility, collaboration, and interdependence.

				When a lot of creativity and innovation are important to success, a transformational style is often a beneficial approach.

				If the focus is on achieving a prescribed set of short-term goals, taking a more transactional approach might lead to less chaos and better results.

									</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				#### [Transactional leadership](https://www.verywellmind.com/what-is-transactional-leadership-2795317)

				Transactional leaders monitor followers carefully to enforce rules, reward success, and punish failure.

				They are tasked with letting group members know exactly what is expected, articulating the rewards of performing tasks well, explaining the consequences of failure, and offering feedback designed to keep workers on task.

				Transactional leaders don't encourage group members to be creative or to find new solutions to problems.

									</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				#### [Leader as role model](https://www.sciencedirect.com/topics/social-sciences/regulatory-focus-theory)

				Leadership behavior encourages followers to opt for a certain self-regulation strategy,
				because leaders serve as role models and,
				by their organizational standing, are entitled to communicate expectations

				By modeling behaviors like transparency, empathy, and accountability,
				leaders build trust and establish "how things are done,"
				directly influencing employee behavior and performance.

					</textarea>
				</section>


				<section data-markdown>
					<textarea data-template>
				#### [Leader / follower style fit](https://www.sciencedirect.com/topics/social-sciences/regulatory-focus-theory)

				<img alt="is this team or group" src="images/leader-follower-fit.gif" width="70%">

				Fit between the encouraged strategy and followers’ own self-regulatory preference
				will lead to higher task involvement and more positive evaluations of the leader
					</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				#### [Strongly polarized Styles](https://www.sciencedirect.com/topics/social-sciences/regulatory-focus-theory)

				Promotion-oriented individuals thrive on progress
				and enjoy recognition of accomplishment.

				Conversely, individuals with a prevention orientation are cautiously optimistic
				and perceive the maintenance of status quo
				and avoidance of negative outcomes as their defining and dominant motive.

				Promotion-focused and prevention-focused individuals
				frequently experience conflicts in goals, methods, and decision-making styles

					</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				#### [Conflict sources](https://www.sciencedirect.com/topics/social-sciences/regulatory-focus-theory)

				<img alt="is this team or group" src="images/possible_conflicts.png" width="70%">

				These opposing motivations, if not managed, can lead to communication breakdowns,
				decreased team effectiveness, and personal burnout.
					</textarea>
				</section>


				<section data-markdown>
					<textarea data-template>
				#### [Person-Environment fit](https://en.wikipedia.org/wiki/Person%E2%80%93environment_fit)

				Person–environment fit (P–E) is the degree to which individual and environmental characteristics match.

				P-E fit consist of compatibility aspects like

				- Person–organization fit (P-O)
				- Person–job fit (P–J)
				- Person–group fit (P–G)
				- Person–skill fit (P-S)

				Person–environment fit has been linked to a number of affective outcomes,
				including job satisfaction, organizational commitment, and intent to quit.

					</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				#### [Theory of Work Adjustment (TWA)](https://www.ebsco.com/research-starters/psychology/theory-work-adjustment-twa)

				Both workers and employers have requirements.
				The degree to which those standards are met is called correspondence.

				Each work environment meets some of the many needs required by workers, but not all.
				Flexibility measures how well an employee deals with conditions that do not match their preferences.
				Correspondence is often best achieved when employees only have to use a small amount of their flexibility.

					</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				#### [Fit and misfit matter](https://pure.mpg.de/rest/items/item_3581969_6/component/file_3595771/content)

				Environments shape people, and at the same time, people are attracted to environments
				that fit their characteristics
				because fit facilitates the achievement of people’s desired life outcomes,
				such as relationship satisfaction, work success,
				and well-being.

				While P-E fit seems relevant for several positive
				outcomes, such as job success and satisfaction with life
				and social relationships, P-E misfit can predict negative
				consequences.
					</textarea>
				</section>

				<section data-markdown>

				#### [what makes an effective team?](https://rework.withgoogle.com/intl/en/guides/understand-team-effectiveness)

				- Psychological safety - “If I make a mistake on our team, it is not held against me.”
				- Dependability - “When my teammates say they’ll do something, they follow through with it.”
				- Structure and Clarity - “Our team has an effective decision-making process.”
				- Meaning - “The work I do for our team is meaningful to me.”
				- Impact - “I understand how our team’s work contributes to the organization's goals.”
					</textarea>
				</section>

				<section data-markdown>
					<textarea data-template>
				#### [Psychological safety](https://www.youtube.com/watch?v=GZgmoxOgfig)

				A strong team culture was correlated with each member’s perception
				of the consequences of taking an interpersonal risk.
				Those on teams with strong cultures feel safe taking risks
				in the face of being seen as ignorant, incompetent, negative, or disruptive.
				In a team with high psychological safety,
				teammates feel safe to take risks around their team members.
				They feel confident that no one on the team will embarrass
				or punish anyone else for admitting a mistake, asking a question,
				or offering a new idea.


					</textarea>
				</section>
